<script>
const TASKS = [{"code": "P2.01", "title": "Het juiste advies geven over een virusscanner", "steps": [{"label": "Start opdracht", "title": "Start opdracht", "html": "\n    <p><strong>P2.01 · Het juiste advies geven over een virusscanner</strong></p>\n    <p>In deze opdracht leer je hoe je als servicemedewerker een klant helpt bij het kiezen van een virusscanner. Je stelt gerichte vragen om het probleem helder te krijgen, geeft passend advies en evalueert het gesprek samen met een notulist.</p>\n    <div class=\"note\"><strong>Werkwijze:</strong> werk in rollen, stel open vragen, geef een passend advies en verzamel bewijs voor je portfolio.</div>\n    \n    "}, {"label": "Wat leer je?", "title": "Wat leer je?", "html": "<p>Na deze dagtaak kun je uitleggen en laten zien dat je dit beheerst:</p><ul class=\"compact-list\"><li>Hoe je open vragen stelt om de hulpvraag van de klant te achterhalen.</li><li>Hoe je een passend advies geeft op basis van de klantbehoefte.</li><li>Hoe je een klantgesprek analyseert en verbeterpunten benoemt.</li><li>Hoe je een gespreksverslag (notulen) opstelt.</li></ul>"}, {"label": "Klantvraag", "title": "Klantvraag", "html": "\n        <p>Eén student speelt de klant. Gebruik deze klantvraag als begin van het gesprek:</p>\n        <blockquote>Welke virusscanner moet ik kopen en waar kan ik deze kopen? Ik heb op internet gekeken en kan geen keuze maken. Wat moet ik doen en welke virusscanner kiezen?</blockquote>\n        <p>De servicedeskmedewerker reageert professioneel en vraagt door voordat hij of zij advies geeft.</p>\n    "}, {"label": "Open vragen stellen", "title": "Open vragen stellen", "html": "\n        <p>Stel open vragen om de situatie helder te krijgen. Gebruik deze vragen en voeg waar nodig vervolgvragen toe.</p>\n        <ul class=\"compact-list\"><li>Waarvoor gebruikt u uw computer?</li><li>Heeft u een voorkeur voor gratis of betaalde software?</li><li>Welke beveiligingsproblemen wilt u voorkomen?</li></ul>\n    "}, {"label": "Ad n op een telefoon. Je stelt gerichte vragen om het probleem te achterhalen, geeft een passend advies en evalueert het gesprek samen met een notulist.</p>\n    <div class=\"note\"><strong>Werkwijze:</strong> werk in rollen, stel open vragen, geef een passend advies en verzamel bewijs voor je portfolio.</div>\n    \n    "}, {"label": "Wat leer je?", "title": "Wat leer je?", "html": "<p>Na deze dagtaak kun je uitleggen en laten zien dat je dit beheerst:</p><ul class=\"compact-list\"><li>Hoe je open vragen stelt om de situatie van de klant beter te begrijpen.</li><li>Hoe je een oplossing biedt voor een volle opslag op een telefoon.</li><li>Hoe je dubbele contactpersonen samenvoegt en controleert op de meest recente gegevens.</li><li>Hoe je een klantgesprek analyseert en verbeterpunten benoemt.</li><li>Hoe je een gespreksverslag (notulen) opstelt.</li></ul>"}, {"label": "Klantvraag", "title": "Klantvraag", "html": "\n        <p>Eén student speelt de klant. Gebruik deze klantvraag als begin van het gesprek:</p>\n        <blockquote>Ik heb veel dezelfde contactpersonen in mijn telefoon staan. Kan ik deze samenvoegen? Hoe weet ik wat de meest recente gegevens zijn?</blockquote>\n        <p>De servicedeskmedewerker reageert professioneel en vraagt door voordat hij of zij advies geeft.</p>\n    "}, {"label": "Open vragen stellen", "title": "Open vragen stellen", "html": "\n        <p>Stel open vragen om de situatie helder te krijgen. Gebruik deze vragen en voeg waar nodig vervolgvragen toe.</p>\n        <ul class=\"compact-list\"><li>Welke meldingen krijgt u precies over het volle geheugen?</li><li>Wat neemt het meeste ruimte in beslag (foto’s, apps, video&#x27;s, documenten)?</li><li>Slaat u contactpersonen op in Google, iCloud of op de simkaart?</li><li>Wilt u dubbele contacten automatisch laten samenvoegen of handmatig beheren?</li></ul>\n    "}, {"label": "Advies of oplossing", "title": "Advies of oplossing", "html": "\n        <p>Geef pas advies nadat de klantbehoefte duidelijk is. Kies een oplossing die past bij de situatie.</p>\n        <ul class=\"compact-list two-col\"><li>Grote of ongebruikte bestanden verwijderen of overzetten naar een cloudopslag.</li><li>Onnodige apps verwijderen of cachegeheugen legen.</li><li>Dubbele contactpersonen samenvoegen via de contacten-app (Google of iCloud).</li><li>Contactgegevens vergelijken op basis van de laatste bewerkingsdatum.</li></ul>\n        <div class=\"info\"><strong>Tip:</strong> controleer je advies met een betrouwbare bron of met je docent.</div>\n    "}, {"label": "Notulen maken", "title": "Notulen maken", "html": "\n        <p>Een derde student is notulist. Noteer kort en duidelijk:</p>\n        <ul class=\"compact-list\"><li>De gestelde vragen en antwoorden van de klant.</li><li>De uiteindelijke oplossing en het advies.</li><li>Eventuele sterke en verbeterpunten in het gesprek.</li></ul>\n    "}, {"label": "Gesprek evalueren", "title": "Gesprek evalueren", "html": "\n        <p>Bespreek samen het klantgesprek. Gebruik de notulen als bewijs.</p>\n        <ul class=\"compact-list\"><li>Is het probleem goed geanalyseerd?</li><li>Heeft de servicedeskmedewerker duidelijke vragen gesteld?</li><li>Heeft de klant een bruikbaar advies gekregen?</li><li>Wat ging goed (tops) en wat kan beter (tips)?</li></ul>\n        \n    "}, {"label": "Portfolio-bewijs", "title": "Portfolio-bewijs", "html": "<p>Bewaar bewijs waarmee je laat zien wat je hebt gedaan en geleerd.</p><ul class=\"compact-list\"><li>Gespreksnotulen of kort verslag.</li><li>Welke vragen je stelde en welke antwoorden je kreeg.</li><li>Het advies of de oplossing die je gaf.</li><li>Korte reflectie: wat ging goed en wat kan beter?</li></ul>"}]}, {"code": "P2.05", "title": "Problemen met oortjes en geluid oplossen", "steps": [{"label": "Start opdracht", "title": "Start opdracht", "html": "\n    <p><strong>P2.05 · Problemen met oortjes en geluid oplossen</strong></p>\n    <p>In deze opdracht leer je hoe je als servicedeskmedewerker een klant helpt bij het oplossen van een probleem met het geluid van oortjes op een laptop. Je stelt gerichte vragen om de oorzaak te achterhalen, geeft een passend advies en evalueert het gesprek samen met een notulist.</p>\n    <div class=\"note\"><strong>Werkwijze:</strong> werk in rollen, stel open vragen, geef een passend advies en verzamel bewijs voor je portfolio.</div>\n    \n    "}, {"label": "Wat leer je?", "title": "Wat leer je?", "html": "<p>Na deze dagtaak kun je uitleggen en laten zien dat je dit beheerst:</p><ul class=\"compact-list\"><li>Hoe je open vragen stelt om het probleem van de klant te begrijpen.</li><li>Hoe je een passende oplossing vindt voor een geluidsprobleem met oortjes.</li><li>Hoe je een klantgesprek analyseert en verbeterpunten benoemt.</li><li>Hoe je een gespreksverslag (notulen) opstelt.</li></ul>"}, {"label": "Klantvraag", "title": "Klantvraag", "html": "\n        <p>Eén student speelt de klant. Gebruik deze klantvraag als begin van het gesprek:</p>\n        <blockquote>Ik krijg geen geluid binnen als ik mijn oortjes in de laptop stop. Wat kan ik doen?</blockquote>\n        <p>De servicedeskmedewerker reageert professioneel en vraagt door voordat hij of zij advies geeft.</p>\n    "}, {"label": "Open vragen stellen", "title": "Open vragen stellen", "html": "\n        <p>Stel open vragen om de situatie helder te krijgen. Gebruik deze vragen en voeg waar nodig vervolgvragen toe.</p>\n        <ul class=\"compact-list\"><li>Hebben de oortjes eerder wel gewerkt op deze laptop?</li><li>Werken de oortjes wel op een ander apparaat, zoals een telefoon?</li><li>Worden de oortjes herkend door de laptop?</li><li>Is het juiste afspeelapparaat geselecteerd in de geluidsinstellingen?</li></ul>\n    "}, {"label": "Advies of oplossing", "title": "Advies of oplossing", "html": "\n        <p>Geef pas advies nadat de klantbehoefte duidelijk is. Kies een oplossing die past bij de situatie.</p>\n        <ul class=\"compact-list two-col\"><li>Controleren of de oortjes goed zijn aangesloten.</li><li>Proberen of een andere set oortjes wel werkt.</li><li>De standaard audio-uitvoer controleren en wijzigen in de instellingen.</li><li>De audiostuurprogramma’s controleren en indien nodig bijwerken.</li></ul>\n        <div class=\"info\"><strong>Tip:</strong> controleer je advies met een betrouwbare bron of met je docent.</div>\n    "}, {"label": "Notulen maken", "title": "Notulen maken", "html": "\n        <p>Een derde student is notulist. Noteer kort en duidelijk:</p>\n        <ul class=\"compact-list\"><li>De gestelde vragen en antwoorden van de klant.</li><li>De uiteindelijke oplossing en het advies.</li><li>Eventuele sterke en verbeterpunten in het gesprek.</li></ul>\n    "}, {"label": "Gesprek evalueren", "title": "Gesprek evalueren", "html": "\n        <p>Bespreek samen het klantgesprek. Gebruik de notulen als bewijs.</p>\n        <ul class=\"compact-list\"><li>Is het probleem goed geanalyseerd?</li><li>Heeft de servicedeskmedewerker duidelijke vragen gesteld?</li><li>Heeft de klant een bruikbaar advies gekregen?</li><li>Wat ging goed (tops) en wat kan beter (tips)?</li></ul>\n        \n    "}, {"label": "Portfolio-bewijs", "title": "Portfolio-bewijs", "html": "<p>Bewaar bewijs waarmee je laat zien wat je hebt gedaan en geleerd.</p><ul class=\"compact-list\"><li>Gespreksnotulen of kort verslag.</li><li>Welke vragen je stelde en welke antwoorden je kreeg.</li><li>Het advies of de oplossing die je gaf.</li><li>Korte reflectie: wat ging goed en wat kan beter?</li></ul>"}]}, {"code": "P2.06", "title": "Foto’s delen via e-mail", "steps": [{"label": "Start opdracht", "title": "Start opdracht", "html": "\n    <p><strong>P2.06 · Foto’s delen via e-mail</strong></p>\n    <p>In deze opdracht leer je hoe je als servicedeskmedewerker een klant helpt bij het versturen van vakantiefoto’s via e-mail. Je stelt gerichte vragen om de beste oplossing te vinden, geeft een passend advies en evalueert het gesprek samen met een notulist.</p>\n    <div class=\"note\"><strong>Werkwijze:</strong> werk in rollen, stel open vragen, geef een passend advies en verzamel bewijs voor je portfolio.</div>\n    \n    "}, {"label": "Wat leer je?", "title": "Wat leer je?", "html": "<p>Na deze dagtaak kun je uitleggen en laten zien dat je dit beheerst:</p><ul class=\"compact-list\"><li>Hoe je open vragen stelt om de wensen van de klant te begrijpen.</li><li>Hoe je geschikte methoden voor het verzenden van grote bestanden adviseert.</li><li>Hoe je een klantgesprek analyseert en verbeterpunten benoemt.</li><li>Hoe je een gespreksverslag (notulen) opstelt.</li></ul>"}, {"label": "Klantvraag", "title": "Klantvraag", "html": "\n        <p>Eén student speelt de klant. Gebruik deze klantvraag als begin van het gesprek:</p>\n        <blockquote>Ik wil foto’s van mijn vakantie mailen naar een goede vriendin zodat zij een fotoalbum kan maken, maar ik weet niet hoe ik dit het beste kan doen. Kunt u helpen?</blockquote>\n        <p>De servicedeskmedewerker reageert professioneel en vraagt door voordat hij of zij advies geeft.</p>\n    "}, {"label": "Open vragen stellen", "title": "Open vragen stellen", "html": "\n        <p>Stel open vragen om de situatie helder te krijgen. Gebruik deze vragen en voeg waar nodig vervolgvragen toe.</p>\n        <ul class=\"compact-list\"><li>Hoeveel foto’s wilt u versturen?</li><li>Heeft u al geprobeerd ze via e-mail te verzenden?</li><li>Heeft u een cloudopslag zoals Google Drive, OneDrive of WeTransfer geprobeerd?</li><li>Wil de ontvanger de foto’s kunnen bewerken of alleen bekijken?</li></ul>\n    "}, {"label": "Advies of oplossing", "title": "Advies of oplossing", "html": "\n        <p>Geef pas advies nadat de klantbehoefte duidelijk is. Kies een oplossing die past bij de situatie.</p>\n        <ul class=\"compact-list two-col\"><li>Een klein aantal foto’s rechtstreeks via e-mail versturen.</li><li>Grote bestanden delen via Google Drive, OneDrive of WeTransfer.</li><li>Een gedeelde map aanmaken in een cloudopslag waar de vriendin de foto’s kan downloaden.</li><li>Foto’s comprimeren (verkleinen) om ze gemakkelijker te versturen.</li></ul>\n        <div class=\"info\"><strong>Tip:</strong> controleer je advies met een betrouwbare bron of met je docent.</div>\n    "}, {"label": "Notulen maken", "title": "Notulen maken", "html": "\n        <p>Een derde student is notulist. Noteer kort en duidelijk:</p>\n        <ul class=\"compact-list\"><li>De gestelde vragen en antwoorden van de klant.</li><li>De uiteindelijke oplossing en het advies.</li><li>Eventuele sterke en verbeterpunten in het gesprek.</li></ul>\n    "}, {"label": "Gesprek evalueren", "title": "Gesprek evalueren", "html": "\n        <p>Bespreek samen het klantgesprek. Gebruik de notulen als bewijs.</p>\n        <ul class=\"compact-list\"><li>Is het probleem goed geanalyseerd?</li><li>Heeft de servicedeskmedewerker duidelijke vragen gesteld?</li><li>Heeft de klant een bruikbaar advies gekregen?</li><li>Wat ging goed (tops) en wat kan beter (tips)?</li></ul>\n        \n    "}, {"label": "Portfolio-bewijs", "title": "Portfolio-bewijs", "html": "<p>Bewaar bewijs waarmee je laat zien wat je hebt gedaan en geleerd.</p><ul class=\"compact-list\"><li>Gespreksnotulen of kort verslag.</li><li>Welke vragen je stelde en welke antwoorden je kreeg.</li><li>Het advies of de oplossing die je gaf.</li><li>Korte reflectie: wat ging goed en wat kan beter?</li></ul>"}]}, {"code": "P2.07", "title": "Netwerkabel maken", "steps": [{"label": "Start opdracht", "title": "Start opdracht", "html": "\n    <p><strong>P2.07 · Netwerkabel maken</strong></p>\n    <p>Je maakt en test een rechte UTP-netwerkkabel met RJ45-connectoren volgens de T568B-standaard.</p>\n    <div class=\"note\"><strong>Werkwijze:</strong> werk in rollen, stel open vragen, geef een passend advies en verzamel bewijs voor je portfolio.</div>\n    \n    "}, {"label": "Doel", "title": "Doel", "html": "<p>Het correct assembleren en testen van een straight-through (rechte) Unshielded Twisted Pair (UTP) netwerkkabel met RJ45-connectoren aan beide uiteinden, volgens de T568B-standaard.</p><div class=\"note\"><strong>Let op:</strong> werk netjes en controleer de adervolgorde voordat je crimpt.</div>"}, {"label": "Benodigdheden", "title": "Benodigdheden", "html": "<p>Leg alles klaar voordat je begint.</p><ul class=\"compact-list two-col\"><li>UTP-kabel (Cat5e of Cat6): Een stuk op de gewenste lengte.</li><li>RJ45-connectoren (8P8C): Twee stuks.</li><li>Krimptang (voor RJ45).</li><li>Kabelstripper/Kniptang.</li><li>Kabeltester (optioneel, maar sterk aanbevolen).</li><li>Veiligheidsbril (aanbevolen).</li></ul>"}, {"label": "Kabel voorbereiden", "title": "Kabel voorbereiden", "html": "\n        <p>Knip de UTP-kabel op de gewenste lengte.</p>\n        <ul class=\"compact-list\"><li>Strip ongeveer 2–3 cm van de buitenmantel.</li><li>Beschadig de gedraaide aderparen niet.</li><li>Werk rustig en controleer beide kanten.</li></ul>\n    "}, {"label": "Aders ordenen", "title": "Aders ordenen", "html": "\n        <p>Ontwind de aderparen en leg de draden volgens <strong>T568B</strong>.</p>\n        <ol class=\"compact-list two-col\"><li>Wit/Oranje</li><li>Oranje</li><li>Wit/Groen</li><li>Blauw</li><li>Wit/Blauw</li><li>Groen</li><li>Wit/Bruin</li><li>Bruin</li></ol>\n    "}, {"label": "Aders afknippen", "title": "Aders afknippen", "html": "\n        <p>Houd de draden strak naast elkaar en knip ze recht af.</p>\n        <div class=\"info\"><strong>Controle:</strong> de mantel moet tot in de RJ45-connector komen, zodat de trekontlasting goed werkt.</div>\n    "}, {"label": "Connector crimpen", "title": "Connector crimpen", "html": "\n        <p>Schuif de RJ45-connector over de draden. Controleer of elke draad helemaal voorin zit.</p>\n        <ul class=\"compact-list\"><li>Clip naar beneden of pinnen naar boven.</li><li>Controleer opnieuw de volgorde.</li><li>Knijp de krimptang stevig dicht.</li></ul>\n    "}, {"label": "Tweede kant en test", "title": "Tweede kant en test", "html": "\n        <p>Herhaal dezelfde stappen aan de andere kant van de kabel. Gebruik opnieuw T568B.</p>\n        <ul class=\"compact-list\"><li>Test met de kabeltester.</li><li>De lampjes moeten in volgorde 1 t/m 8 lopen.</li><li>Herstel de connector als de volgorde niet klopt.</li></ul>\n    "}, {"label": "Portfolio-bewijs", "title": "Portfolio-bewijs", "html": "<p>Bewaar bewijs waarmee je laat zien wat je hebt gedaan en geleerd.</p><ul class=\"compact-list\"><li>Foto of screenshot van je werkproces.</li><li>Beschrijving van de gemaakte instellingen of handelingen.</li><li>Testresultaat of controlebewijs.</li><li>Korte reflectie: wat ging goed en wat kan beter?</li></ul>"}]}, {"code": "P2.08", "title": "Wi-Fi-router instellen en resetten", "steps": [{"label": "Start opdracht", "title": "Start opdracht", "html": "\n    <p><strong>P2.08 · Wi-Fi-router instellen en resetten</strong></p>\n    <p>In deze opdracht leer je hoe je een Wi-Fi-router instelt, reset en aansluit op een laptop. Je doorloopt alle stappen om een router correct te configureren en het netwerk werkend te krijgen.</p>\n    <div class=\"note\"><strong>Werkwijze:</strong> werk in rollen, stel open vragen, geef een passend advies en verzamel bewijs voor je portfolio.</div>\n    \n    "}, {"label": "Wat leer je?", "title": "Wat leer je?", "html": "<p>Na deze dagtaak kun je uitleggen en laten zien dat je dit beheerst:</p><ul class=\"compact-list\"><li>Hoe je een Wi-Fi-router instelt en aansluit.</li><li>Hoe je toegang krijgt tot de instellingen van de router.</li><li>Hoe je een router reset naar de fabrieksinstellingen.</li><li>Hoe je de Wi-Fi-instellingen configureert en test.</li></ul>"}, {"label": "Router uitpakken", "title": "Router uitpakken", "html": "<p>Voer deze stap uit en controleer daarna of je verder kunt.</p><ul class=\"compact-list\"><li>Haal de router voorzichtig uit de doos of uit de bak.</li><li>Controleer of alle onderdelen aanwezig zijn: router, voedingsadapter en Ethernet-kabel.</li></ul>"}, {"label": "Router opstarten", "title": "Router opstarten", "html": "<p>Voer deze stap uit en controleer daarna of je verder kunt.</p><ul class=\"compact-list\"><li>Sluit de voedingsadapter aan op de router en steek deze in een stopcontact.</li><li>Zet de router aan en wacht tot de lampjes stabiel branden.</li></ul>"}, {"label": "Router aansluiten op de laptop", "title": "Router aansluiten op de laptop", "html": "<p>Voer deze stap uit en controleer daarna of je verder kunt.</p><ul class=\"compact-list\"><li>❔ Verbind de router met je laptop via de Ethernet-kabel. Welke aansluiting van de router gebruik je?</li><li>Zorg ervoor dat beide uiteinden goed vastzitten.</li></ul>"}, {"label": "Routerinstellingen", "title": "Routerinstellingen", "html": "<p>Voer deze stap uit en controleer daarna of je verder kunt.</p><ul class=\"compact-list\"><li>Open een webbrowser op je laptop.</li><li>Typ het standaard IP-adres van de router in de adresbalk (bijvoorbeeld 192.168.1.1 of 192.168.0.1).</li><li>Log in met de standaard gebruikersnaam en wachtwoord (vaak te vinden op een sticker op de router).</li></ul>"}, {"label": "Router resetten", "title": "Router resetten", "html": "<p>Voer deze stap uit en controleer daarna of je verder kunt.</p><ul class=\"compact-list\"><li>Zoek in de instellingen naar de optie om de router te resetten naar de fabrieksinstellingen.</li><li>Volg de instructies op het scherm om het resetproces te voltooien.</li></ul>"}, {"label": "Wi-Fi-instellingen configureren", "title": "Wi-Fi-instellingen configureren", "html": "<p>Voer deze stap uit en controleer daarna of je verder kunt.</p><ul class=\"compact-list\"><li>Stel een nieuwe netwerknaam (SSID) en een sterk wachtwoord in.</li><li>Kies de juiste beveiligingsinstellingen, zoals WPA2 of WPA3.</li></ul>"}, {"label": "Verbinding testen", "title": "Verbinding testen", "html": "<p>Voer deze stap uit en controleer daarna of je verder kunt.</p><ul class=\"compact-list\"><li>Koppel de Ethernet-kabel los van de laptop.</li><li>Zoek het nieuwe Wi-Fi-netwerk op en maak verbinding met het ingevoerde wachtwoord.</li><li>Controleer of je internettoegang hebt.</li><li>Tip: Vraag je docent om hulp als je ergens vastloopt tijdens de installatie.</li><li>Door deze stappen te volgen, leer je hoe je zelfstandig een Wi-Fi-router instelt en configureert!</li></ul>"}, {"label": "Portfolio-bewijs", "title": "Portfolio-bewijs", "html": "<p>Bewaar bewijs waarmee je laat zien wat je hebt gedaan en geleerd.</p><ul class=\"compact-list\"><li>Foto of screenshot van je werkproces.</li><li>Beschrijving van de gemaakte instellingen of handelingen.</li><li>Testresultaat of controlebewijs.</li><li>Korte reflectie: wat ging goed en wat kan beter?</li></ul>"}]}, {"code": "P2.09", "title": "Een automatische handtekening instellen in Word", "steps": [{"label": "Start opdracht", "title": "Start opdracht", "html": "\n    <p><strong>P2.09 · Een automatische handtekening instellen in Word</strong></p>\n    <p>In deze opdracht leer je hoe je als servicedeskmedewerker een klant helpt bij het instellen van een automatische handtekening in Microsoft Word. Je stelt gerichte vragen om het probleem te achterhalen, geeft een passend advies en evalueert het gesprek samen met een notulist.</p>\n    <div class=\"note\"><strong>Werkwijze:</strong> werk in rollen, stel open vragen, geef een passend advies en verzamel bewijs voor je portfolio.</div>\n    \n    "}, {"label": "Wat leer je?", "title": "Wat leer je?", "html": "<p>Na deze dagtaak kun je uitleggen en laten zien dat je dit beheerst:</p><ul class=\"compact-list\"><li>Hoe je open vragen stelt om de wensen van de klant te begrijpen.</li><li>Hoe je een automatische handtekening instelt in Microsoft Word.</li><li>Hoe je een klantgesprek analyseert en verbeterpunten benoemt.</li><li>Hoe je een gespreksverslag (notulen) opstelt.</li></ul>"}, {"label": "Klantvraag", "title": "Klantvraag", "html": "\n        <p>Eén student speelt de klant. Gebruik deze klantvraag als begin van het gesprek:</p>\n        <blockquote>Ik wil in Word een automatische handtekening zodat ik dit niet elke keer moet typen. Kunt u mij hiermee helpen?</blockquote>\n        <p>De servicedeskmedewerker reageert professioneel en vraagt door voordat hij of zij advies geeft.</p>\n    "}, {"label": "Open vragen stellen", "title": "Open vragen stellen", "html": "\n        <p>Stel open vragen om de situatie helder te krijgen. Gebruik deze vragen en voeg waar nodig vervolgvragen toe.</p>\n        <ul class=\"compact-list\"><li>Wilt u een handtekening als tekst of als afbeelding invoegen?</li><li>Wilt u dat de handtekening automatisch verschijnt in elk document of alleen bij bepaalde documenten?</li><li>Gebruikt u Microsoft Word op een pc, laptop of in de cloud (OneDrive/Office 365)?</li></ul>\n    "}, {"label": "Advies of oplossing", "title": "Advies of oplossing", "html": "\n        <p>Geef pas advies nadat de klantbehoefte duidelijk is. Kies een oplossing die past bij de situatie.</p>\n        <ul class=\"compact-list two-col\"><li>Een handtekening toevoegen via Invoegen &gt; Tekst &gt; Handtekeningregel.</li><li>Een tekstblok met de handtekening maken en opslaan als Snelle onderdelen of AutoTekst.</li><li>Een afbeelding van de handtekening invoegen en deze opslaan als standaard element.</li></ul>\n        <div class=\"info\"><strong>Tip:</strong> controleer je advies met een betrouwbare bron of met je docent.</div>\n    "}, {"label": "Notulen maken", "title": "Notulen maken", "html": "\n        <p>Een derde student is notulist. Noteer kort en duidelijk:</p>\n        <ul class=\"compact-list\"><li>De gestelde vragen en antwoorden van de klant.</li><li>De uiteindelijke oplossing en het advies.</li><li>Eventuele sterke en verbeterpunten in het gesprek.</li></ul>\n    "}, {"label": "Gesprek evalueren", "title": "Gesprek evalueren", "html": "\n        <p>Bespreek samen het klantgesprek. Gebruik de notulen als bewijs.</p>\n  te sluiten?</blockquote>\n        <p>De servicedeskmedewerker reageert professioneel en vraagt door voordat hij of zij advies geeft.</p>\n    "}, {"label": "Open vragen stellen", "title": "Open vragen stellen", "html": "\n        <p>Stel open vragen om de situatie helder te krijgen. Gebruik deze vragen en voeg waar nodig vervolgvragen toe.</p>\n        <ul class=\"compact-list\"><li>Wat is het merk en model van de printer?</li><li>Wilt u de printer aansluiten via USB of Wi-Fi?</li><li>Welke computer of besturingssysteem gebruikt u?</li><li>Heeft u de printer al aangesloten op stroom?</li></ul>\n    "}, {"label": "Advies of oplossing", "title": "Advies of oplossing", "html": "\n        <p>Geef pas advies nadat de klantbehoefte duidelijk is. Kies een oplossing die past bij de situatie.</p>\n        <ul class=\"compact-list two-col\"><li>De printer aansluiten met een USB-kabel of instellen via Wi-Fi.</li><li>De printerdriver downloaden en installeren via de website van de fabrikant.</li><li>De printer toevoegen in Windows via Instellingen &gt; Apparaten &gt; Printers en scanners of in macOS via Systeeminstellingen &gt; Printers en scanners.</li><li>Een testpagina afdrukken om te controleren of de printer goed werkt.</li></ul>\n        <div class=\"info\"><strong>Tip:</strong> controleer je advies met een betrouwbare bron of met je docent.</div>\n    "}, {"label": "Notulen maken", "title": "Notulen maken", "html": "\n        <p>Een derde student is notulist. Noteer kort en duidelijk:</p>\n        <ul class=\"compact-list\"><li>De gestelde vragen en antwoorden van de klant.</li><li>De uiteindelijke oplossing en het advies.</li><li>Eventuele sterke en verbeterpunten in het gesprek.</li></ul>\n    "}, {"label": "Gesprek evalueren", "title": "Gesprek evalueren", "html": "\n        <p>Bespreek samen het klantgesprek. Gebruik de notulen als bewijs.</p>\n        <ul class=\"compact-list\"><li>Is het probleem goed geanalyseerd?</li><li>Heeft de servicedeskmedewerker duidelijke vragen gesteld?</li><li>Heeft de klant een bruikbaar advies gekregen?</li><li>Wat ging goed (tops) en wat kan beter (tips)?</li></ul>\n        \n    "}, {"label": "Portfolio-bewijs", "title": "Portfolio-bewijs", "html": "<p>Bewaar bewijs waarmee je laat zien wat je hebt gedaan en geleerd.</p><ul class=\"compact-list\"><li>Gespreksnotulen of kort verslag.</li><li>Welke vragen je stelde en welke antwoorden je kreeg.</li><li>Het advies of de oplossing die je gaf.</li><li>Korte reflectie: wat ging goed en wat kan beter?</li></ul>"}]}, {"code": "P2.11", "title": "De taalinstellingen van een telefoon wijzigen", "steps": [{"label": "Start opdracht", "title": "Start opdracht", "html": "\n    <p><strong>P2.11 · De taalinstellingen van een telefoon wijzigen</strong></p>\n    <p>In deze opdracht leer je hoe je als servicedeskmedewerker een klant helpt bij het wijzigen van de taalinstellingen van een telefoon. Je stelt gerichte vragen om het probleem te achterhalen, geeft een passend advies en evalueert het gesprek samen met een notulist.</p>\n    <div class=\"note\"><strong>Werkwijze:</strong> werk in rollen, stel open vragen, geef een passend advies en verzamel bewijs voor je portfolio.</div>\n    \n    "}, {"label": "Wat leer je?", "title": "Wat leer je?", "html": "<p>Na deze dagtaak kun je uitleggen en laten zien dat je dit beheerst:</p><ul class=\"compact-list\"><li>Hoe je open vragen stelt om het probleem van de klant te begrijpen.</li><li>Hoe je de taalinstellingen op een telefoon wijzigt.</li><li>Hoe je een klantgesprek analyseert en verbeterpunten benoemt.</li><li>Hoe je een gespreksverslag (notulen) opstelt.</li></ul>"}, {"label": "Klantvraag", "title": "Klantvraag", "html": "\n        <p>Eén student speelt de klant. Gebruik deze klantvraag als begin van het gesprek:</p>\n        <blockquote>Mijn telefoon staat ineens op Duits. Kunt u mij helpen?</blockquote>\n        <p>De servicedeskmedewerker reageert professioneel en vraagt door voordat hij of zij advies geeft.</p>\n    "}, {"label": "Open vragen stellen", "title": "Open vragen stellen", "html": "\n        <p>Stel open vragen om de situatie helder te krijgen. Gebruik deze vragen en voeg waar nodig vervolgvragen toe.</p>\n        <ul class=\"compact-list\"><li>Sinds wanneer staat de telefoon op Duits?</li><li>Heeft u per ongeluk instellingen gewijzigd?</li><li>Welke telefoon gebruikt u (Android of iPhone)?</li><li>Wilt u dat ik u begeleid of dat ik het voordoe?</li></ul>\n    "}, {"label": "Advies of oplossing", "title": "Advies of oplossing", "html": "\n        <p>Geef pas advies nadat de klantbehoefte duidelijk is. Kies een oplossing die past bij de situatie.</p>\n        <ul class=\"compact-list two-col\"><li>Navigeren naar de taalinstellingen en de taal wijzigen.</li><li>Op een Android-telefoon: Einstellungen &gt; System &gt; Sprachen &amp; Eingabe &gt; Sprachen &gt; Sprache hinzufügen en Nederlands selecteren.</li><li>Op een iPhone: Einstellungen &gt; Allgemein &gt; Sprache &amp; Region &gt; iPhone-Sprache en Nederlands selecteren.</li><li>Controleren of de taal van apps en toetsenbord ook correct is ingesteld.</li></ul>\n        <div class=\"info\"><strong>Tip:</strong> controleer je advies met een betrouwbare bron of met je docent.</div>\n    "}, {"label": "Notulen maken", "title": "Notulen maken", "html": "\n        <p>Een derde student is notulist. Noteer kort en duidelijk:</p>\n        <ul class=\"compact-list\"><li>De gestelde vragen en antwoorden van de klant.</li><li>De uiteindelijke oplossing en het advies.</li><li>Eventuele sterke en verbeterpunten in het gesprek.</li></ul>\n    "}, {"label": "Gesprek evalueren", "title": "Gesprek evalueren", "html": "\n        <p>Bespreek samen het klantgesprek. Gebruik de notulen als bewijs.</p>\n        <ul class=\"compact-list\"><li>Is het probleem goed geanalyseerd?</li><li>Heeft de servicedeskmedewerker duidelijke vragen gesteld?</li><li>Heeft de klant een bruikbaar advies gekregen?</li><li>Wat ging goed (tops) en wat kan beter (tips)?</li></ul>\n        \n    "}, {"label": "Portfolio-bewijs", "title": "Portfolio-bewijs", "html": "<p>Bewaar bewijs waarmee je laat zien wat je hebt gedaan en geleerd.</p><ul class=\"compact-list\"><li>Gespreksnotulen of kort verslag.</li><li>Welke vragen je stelde en welke antwoorden je kreeg.</li><li>Het advies of de oplossing die je gaf.</li><li>Korte reflectie: wat ging goed en wat kan beter?</li></ul>"}]}, {"code": "P2.12", "title": "De juiste virusscanner kiezen", "steps": [{"label": "Start opdracht", "title": "Start opdracht", "html": "\n    <p><strong>P2.12 · De juiste virusscanner kiezen</strong></p>\n    <p>In deze opdracht leer je hoe je als servicedeskmedewerker een klant helpt bij het kiezen van een geschikte virusscanner. Je stelt gerichte vragen om de wensen van de klant te achterhalen, geeft een passend advies en evalueert het gesprek samen met een notulist.</p>\n    <div class=\"note\"><strong>Werkwijze:</strong> werk in rollen, stel open vragen, geef een passend advies en verzamel bewijs voor je portfolio.</div>\n    \n    "}, {"label": "Wat leer je?", "title": "Wat leer je?", "html": "<p>Na deze dagtaak kun je uitleggen en laten zien dat je dit beheerst:</p><ul class=\"compact-list\"><li>Hoe je open vragen stelt om de behoeften van de klant te begrijpen.</li><li>Hoe je de juiste virusscanner kiest op basis van de wensen en situatie van de klant.</li><li>Hoe je een klantgesprek analyseert en verbeterpunten benoemt.</li><li>Hoe je een gespreksverslag (notulen) opstelt.</li></ul>"}, {"label": "Klantvraag", "title": "Klantvraag", "html": "\n        <p>Eén student speelt de klant. Gebruik deze klantvraag als begin van het gesprek:</p>\n        <blockquote>Welke virusscanner moet ik kopen en waar kan ik deze kopen? Ik heb op internet gekeken en kan geen keuze maken. Wat moet ik doen en welke virusscanner kiezen?</blockquote>\n        <p>De servicedeskmedewerker reageert professioneel en vraagt door voordat hij of zij advies geeft.</p>\n    "}, {"label": "Open vragen stellen", "title": "Open vragen stellen", "html": "\n        <p>Stel open vragen om de situatie helder te krijgen. Gebruik deze vragen en voeg waar nodig vervolgvragen toe.</p>\n        <ul class=\"compact-list\"><li>Waarvoor gebruikt u uw computer?</li><li>Wilt u een gratis of betaalde virusscanner?</li><li>Heeft u specifieke wensen, zoals ouderlijk toezicht of bescherming tegen phishing?</li><li>Gebruikt u Windows, macOS of een ander besturingssysteem?</li></ul>\n    "}, {"label": "Advies of oplossing", "title": "Advies of oplossing", "html": "\n        <p>Geef pas advies nadat de klantbehoefte duidelijk is. Kies een oplossing die past bij de situatie.</p>\n        <ul class=\"compact-list two-col\"><li>Aanbevelen van een gratis virusscanner zoals Windows Defender, Avast of AVG.</li><li>Voorstellen van een betaalde optie zoals Norton, Bitdefender of Kaspersky voor extra beveiliging.</li><li>Advies geven over waar de software te downloaden of te kopen (bijvoorbeeld via de officiële website van de fabrikant).</li></ul>\n        <div class=\"info\"><strong>Tip:</strong> controleer je advies met een betrouwbare bron of met je docent.</div>\n    "}, {"label": "Notulen maken", "title": "Notulen maken", "html": "\n        <p>Een derde student is notulist. Noteer kort en duidelijk:</p>\n        <ul class=\"compact-list\"><li>De gestelde vragen en antwoorden van de klant.</li><li>De uiteindelijke oplossing en het advies.</li><li>Eventuele sterke en verbeterpunten in het gesprek.</li></ul>\n    "}, {"label": "Gesprek evalueren", "title": "Gesprek evalueren", "html": "\n        <p>Bespreek samen het klantgesprek. Gebruik de notulen als bewijs.</p>\n        <ul class=\"compact-list\"><li>Is het probleem goed geanalyseerd?</li><li>Heeft de servicedeskmedewerker duidelijke vragen gesteld?</li><li>Heeft de klant een bruikbaar advies gekregen?</li><li>Wat ging goed (tops) en wat kan beter (tips)?</li></ul>\n        \n    "}, {"label": "Portfolio-bewijs", "title": "Portfolio-bewijs", "html": "<p>Bewaar bewijs waarmee je laat zien wat je hebt gedaan en geleerd.</p><ul class=\"compact-list\"><li>Gespreksnotulen of kort verslag.</li><li>Welke vragen je stelde en welke antwoorden je kreeg.</li><li>Het advies of de oplossing die je gaf.</li><li>Korte reflectie: wat ging goed en wat kan beter?</li></ul>"}]}, {"code": "P2.13", "title": "Toegang tot e-mail van een overleden persoon", "steps": [{"label": "Start opdracht", "title": "Start opdracht", "html": "\n    <p><strong>P2.13 · Toegang tot e-mail van een overleden persoon</strong></p>\n    <p>In deze opdracht leer je hoe je als servicedeskmedewerker een klant helpt bij het verkrijgen van toegang tot de e-mail van een overleden persoon. Je stelt gerichte vragen om de situatie duidelijk te krijgen, geeft een passend advies en evalueert het gesprek samen met een notulist.</p>\n    <div class=\"note\"><strong>Werkwijze:</strong> werk in rollen, stel open vragen, geef een passend advies en verzamel bewijs voor je portfolio.</div>\n    <div class=\"info\"><strong>Let op:</strong> Let op: Dit is een gevoelige situatie. Zorg ervoor dat de servicedeskmedewerker begripvol en professioneel communiceert.</div>\n    "}, {"label": "Wat leer je?", "title": "Wat leer je?", "html": "<p>Na deze dagtaak kun je uitleggen en laten zien dat je dit beheerst:</p><ul class=\"compact-list\"><li>Hoe je open vragen stelt om de situatie van de klant te begrijpen.</li><li>Hoe je een aanvraag voor toegang tot een e-mailaccount correct afhandelt.</li><li>Welke privacy- en beveiligingsregels gelden bij het aanvragen van toegang tot een account van een overleden persoon.</li><li>Hoe je een klantgesprek analyseert en verbeterpunten benoemt.</li><li>Hoe je een gespreksverslag (notulen) opstelt.</li></ul>"}, {"label": "Klantvraag", "title": "Klantvraag", "html": "\n        <p>Eén student speelt de klant. Gebruik deze klantvraag als begin van het gesprek:</p>\n        <blockquote>Mijn man is overleden, kan ik zijn mail ontvangen?</blockquote>\n        <p>De servicedeskmedewerker reageert professioneel en vraagt door voordat hij of zij advies geeft.</p>\n    "}, {"label": "Open vragen stellen", "title": "Open vragen stellen", "html": "\n        <p>Stel open vragen om de situatie helder te krijgen. Gebruik deze vragen en voeg waar nodig vervolgvragen toe.</p>\n        <ul class=\"compact-list\"><li>Heeft u toegang tot het e-mailaccount of de inloggegevens van uw man?</li><li>Om welke e-mailprovider gaat het (bijvoorbeeld Gmail, Outlook, Yahoo)?</li><li>Wilt u het account behouden of alleen belangrijke e-mails ontvangen?</li><li>Heeft u officiële documenten, zoals een overlijdensakte, om een aanvraag in te dienen bij de e-mailprovider?</li></ul>\n    "}, {"label": "Advies of oplossing", "title": "Advies of oplossing", "html": "\n        <p>Geef pas advies nadat de klantbehoefte duidelijk is. Kies een oplossing die past bij de situatie.</p>\n        <ul class=\"compact-list two-col\"><li>Als de klant de inloggegevens heeft, inloggen en eventueel e-mails doorsturen.</li><li>Indien geen toegang: verwijzen naar de officiële procedure van de e-mailprovider (bijvoorbeeld Google of Microsoft heeft een aanvraagproces voor nabestaanden).</li><li>Adviseren over het opslaan of sluiten van het account.</li></ul>\n        <div class=\"info\"><strong>Tip:</strong> controleer je advies met een betrouwbare bron of met je docent.</div>\n    "}, {"label": "Notulen maken", "title": "Notulen maken", "html": "\n        <p>Een derde student is notulist. Noteer kort en duidelijk:</p>\n        <ul class=\"compact-list\"><li>De gestelde vragen en antwoorden van de klant.</li><li>De uiteindelijke oplossing en het advies.</li><li>Eventuele sterke en verbeterpunten in het gesprek.</li></ul>\n    "}, {"label": "Gesprek evalueren", "title": "Gesprek evalueren", "html": "\n        <p>Bespreek samen het klantgesprek. Gebruik de notulen als bewijs.</p>\n        <ul class=\"compact-list\"><li>Is het probleem goed geanalyseerd?</li><li>Heeft de servicedeskmedewerker duidelijke en empathische vragen gesteld?</li><li>Heeft de klant een bruikbaar advies gekregen?</li><li>Wat ging goed (tops) en wat kan beter (tips)?</li></ul>\n        \n    "}, {"label": "Portfolio-bewijs", "title": "Portfolio-bewijs", "html": "<p>Bewaar bewijs waarmee je laat zien wat je hebt gedaan en geleerd.</p><ul class=\"compact-list\"><li>Gespreksnotulen of kort verslag.</li><li>Welke vragen je stelde en welke antwoorden je kreeg.</li><li>Het advies of de oplossing die je gaf.</li><li>Korte reflectie: wat ging goed en wat kan beter?</li></ul>"}]}, {"code": "P2.14", "title": "Toegang tot een vergrendelde computer voor belangrijke gegevens", "steps": [{"label": "Start opdracht", "title": "Start opdracht", "html": "\n    <p><strong>P2.14 · Toegang tot een vergrendelde computer voor belangrijke gegevens</strong></p>\n    <p>In deze opdracht leer je hoe je als servicedeskmedewerker een klant helpt bij het verkrijgen van toegang tot een vergrendelde computer om belangrijke informatie op te halen. Je stelt gerichte vragen om de situatie duidelijk te krijgen, geeft een passend advies en evalueert het gesprek samen met een notulist.</p>\n    <div class=\"note\"><strong>Werkwijze:</strong> werk in rollen, stel open vragen, geef een passend advies en verzamel bewijs voor je portfolio.</div>\n    <div class=\"info\"><strong>Let op:</strong> Let op: Dit is een gevoelige situatie. Zorg ervoor dat de servicedeskmedewerker begripvol en professioneel communiceert en de privacyregels respecteert.</div>\n    "}, {"label": "Wat leer je?", "title": "Wat leer je?", "html": "<p>Na deze dagtaak kun je uitleggen en laten zien dat je dit beheerst:</p><ul class=\"compact-list\"><li>Hoe je open vragen stelt om de situatie van de klant te begrijpen.</li><li>Welke mogelijkheden er zijn om toegang te krijgen tot een vergrendelde computer.</li><li>Welke privacy- en beveiligingsregels van toepassing zijn.</li><li>Hoe je een klantgesprek analyseert en verbeterpunten benoemt.</li><li>Hoe je een gespreksverslag (notulen) opstelt.</li></ul>"}, {"label": "Klantvraag", "title": "Klantvraag", "html": "\n        <p>Eén student speelt de klant. Gebruik deze klantvraag als begin van het gesprek:</p>\n        <blockquote>Mijn vrouw heeft een ongeluk gehad en ligt in het buitenland in het ziekenhuis. Ik kan thuis niet in haar computer omdat ik het wachtwoord niet weet. Ik heb gegevens van haar zorgverzekering en reisverzekering nodig. Kunt u mij helpen?</blockquote>\n        <p>De servicedeskmedewerker reageert professioneel en vraagt door voordat hij of zij advies geeft.</p>\n    "}, {"label": "Open vragen stellen", "title": "Open vragen stellen", "html": "\n        <p>Stel open vragen om de situatie helder te krijgen. Gebruik deze vragen en voeg waar nodig vervolgvragen toe.</p>\n        <ul class=\"compact-list\"><li>Heeft uw vrouw het wachtwoord ergens opgeschreven?</li><li>Gaat het om een Windows- of Mac-computer?</li><li>Staan de gegevens ook in een cloudopslag zoals Google Drive, OneDrive of iCloud?</li><li>Heeft u toegang tot haar e-mailaccount waar de verzekeringsgegevens mogelijk in staan?</li></ul>\n    "}, {"label": "Advies of oplossing", "title": "Advies of oplossing", "html": "\n        <p>Geef pas advies nadat de klantbehoefte duidelijk is. Kies een oplossing die past bij de situatie.</p>\n        <ul class=\"compact-list two-col\"><li>Proberen in te loggen met een ander gebruikersaccount (indien beschikbaar).</li><li>Controleren of de bestanden via een andere computer of cloudopslag toegankelijk zijn.</li><li>Indien een Microsoft- of Apple-account is gekoppeld, via wachtwoordherstel het wachtwoord opnieuw instellen.</li><li>Als geen van bovenstaande werkt, doorverwijzen naar een IT-specialist voor verdere hulp.</li></ul>\n        <div class=\"info\"><strong>Tip:</strong> controleer je advies met een betrouwbare bron of met je docent.</div>\n    "}, {"label": "Notulen maken", "title": "Notulen maken", "html": "\n        <p>Een derde student is notulist. Noteer kort en duidelijk:</p>\n        <ul class=\"compact-list\"><li>De gestelde vragen en antwoorden van de klant.</li><li>De uiteindelijke oplossing en het advies.</li><li>Eventuele sterke en verbeterpunten in het gesprek.</li></ul>\n    "}, {"label": "Gesprek evalueren", "title": "Gesprek evalueren", "html": "\n        <p>Bespreek samen het klantgesprek. Gebruik de notulen als bewijs.</p>\n        <ul class=\"compact-list\"><li>Is het probleem goed geanalyseerd?</li><li>Heeft de servicedeskmedewerker duidelijke en empathische vragen gesteld?</li><li>Heeft de klant een bruikbaar advies gekregen?</li><li>Wat ging goed (tops) en wat kan beter (tips)?</li></ul>\n        \n    "}, {"label": "Portfolio-bewijs", "title": "Portfolio-bewijs", "html": "<p>Bewaar bewijs waarmee je laat zien wat je hebt gedaan en geleerd.</p><ul class=\"compact-list\"><li>Gespreksnotulen of kort verslag.</li><li>Welke vragen je stelde en welke antwoorden je kreeg.</li><li>Het advies of de oplossing die je gaf.</li><li>Korte reflectie: wat ging goed en wat kan beter?</li></ul>"}]}, {"code": "P2.15", "title": "Ongewenste advertenties bij het opstarten van de pc verwijderen", "steps": [{"label": "Start opdracht", "title": "Start opdracht", "html": "\n    <p><strong>P2.15 · Ongewenste advertenties bij het opstarten van de pc verwijderen</strong></p>\n    <p>In deze opdracht leer je hoe je als servicedeskmedewerker een klant helpt bij het oplossen van ongewenste advertenties die verschijnen bij het opstarten van de pc. Je stelt gerichte vragen om de oorzaak te achterhalen, geeft een passend advies en evalueert het gesprek samen met een notulist.</p>\n    <div class=\"note\"><strong>Werkwijze:</strong> werk in rollen, stel open vragen, geef een passend advies en verzamel bewijs voor je portfolio.</div>\n    \n    "}, {"label": "Wat leer je?", "title": "Wat leer je?", "html": "<p>Na deze dagtaak kun je uitleggen en laten zien dat je dit beheerst:</p><ul class=\"compact-list\"><li>Hoe je open vragen stelt om het probleem van de klant te begrijpen.</li><li>Hoe je ongewenste advertenties en mogelijk ongewenste programma’s (PUPs) verwijdert.</li><li>Hoe je een klantgesprek analyseert en verbeterpunten benoemt.</li><li>Hoe je een gespreksverslag (notulen) opstelt.</li></ul>"}, {"label": "Klantvraag", "title": "Klantvraag", "html": "\n        <p>Eén student speelt de klant. Gebruik deze klantvraag als begin van het gesprek:</p>\n        <blockquote>Ik krijg allemaal gekke advertenties als ik mijn pc opstart. Kunt u mij helpen?</blockquote>\n        <p>De servicedeskmedewerker reageert professioneel en vraagt door voordat hij of zij advies geeft.</p>\n    "}, {"label": "Open vragen stellen", "title": "Open vragen stellen", "html": "\n        <p>Stel open vragen om de situatie helder te krijgen. Gebruik deze vragen en voeg waar nodig vervolgvragen toe.</p>\n        <ul class=\"compact-list\"><li>Sinds wanneer ziet u deze advertenties?</li><li>Verschijnen de advertenties in een bepaalde browser of direct bij het opstarten?</li><li>Heeft u recent software geïnstalleerd of iets gedownload?</li><li>Zijn er ongewenste programma’s in de lijst met geïnstalleerde apps?</li></ul>\n    "}, {"label": "Advies of oplossing", "title": "Advies of oplossing", "html": "\n        <p>Geef pas advies nadat de klantbehoefte duidelijk is. Kies een oplossing die past bij de situatie.</p>\n        <ul class=\"compact-list two-col\"><li>Controleren op ongewenste software: Open Instellingen &gt; Apps &gt; Geïnstalleerde apps (Windows) of Toepassingen (macOS) en verwijder verdachte programma’s.</li><li>Scannen op malware: Gebruik Windows Defender of een gratis malware-scanner zoals Malwarebytes om de pc te scannen.</li><li>Opstartprogramma’s controleren: Open Taakbeheer &gt; Opstarten (Windows) en schakel verdachte programma’s uit.</li><li>Browserinstellingen herstellen: Verwijder ongewenste browserextensies in Chrome, Edge of Firefox en stel de standaard startpagina opnieuw in.</li></ul>\n        <div class=\"info\"><strong>Tip:</strong> controleer je advies met een betrouwbare bron of met je docent.</div>\n    "}, {"label": "Notulen maken", "title": "Notulen maken", "html": "\n        <p>Een derde student is notulist. Noteer kort en duidelijk:</p>\n        <ul class=\"compact-list\"><li>De gestelde vragen en antwoorden van de klant.</li><li>De uiteindelijke oplossing en het advies.</li><li>Eventuele sterke en verbeterpunten in het gesprek.</li></ul>\n    "}, {"label": "Gesprek evalueren", "title": "Gesprek evalueren", "html": "\n        <p>Bespreek samen het klantgesprek. Gebruik de notulen als bewijs.</p>\n        <ul class=\"compact-list\"><li>Is het probleem goed geanalyseerd?</li><li>Heeft de servicedeskmedewerker duidelijke vragen gesteld?</li><li>Heeft de klant een bruikbaar advies gekregen?</li><li>Wat ging goed (tops) en wat kan beter (tips)?</li></ul>\n        \n    "}, {"label": "Portfolio-bewijs", "title": "Portfolio-bewijs", "html": "<p>Bewaar bewijs waarmee je laat zien wat je hebt gedaan en geleerd.</p><ul class=\"compact-list\"><li>Gespreksnotulen of kort verslag.</li><li>Welke vragen je stelde en welke antwoorden je kreeg.</li><li>Het advies of de oplossing die je gaf.</li><li>Korte reflectie: wat ging goed en wat kan beter?</li></ul>"}]}, {"code": "P2.16", "title": "Skype of Teams installeren op een tablet", "steps": [{"label": "Start opdracht", "title": "Start opdracht", "html": "\n    <p><strong>P2.16 · Skype of Teams installeren op een tablet</strong></p>\n    <p>In deze opdracht leer je hoe je als servicedeskmedewerker een klant helpt bij het installeren en instellen van Skype of Microsoft Teams op een tablet. Je stelt gerichte vragen om de situatie duidelijk te krijgen, geeft een passend advies en evalueert het gesprek samen met een notulist.</p>\n    <div class=\"note\"><strong>Werkwijze:</strong> werk in rollen, stel open vragen, geef een passend advies en verzamel bewijs voor je portfolio.</div>\n    \n    "}, {"label": "Wat leer je?", "title": "Wat leer je?", "html": "<p>Na deze dagtaak kun je uitleggen en laten zien dat je dit beheerst:</p><ul class=\"compact-list\"><li>Hoe je open vragen stelt om de wensen van de klant te begrijpen.</li><li>Hoe je Skype of Microsoft Teams installeert op een tablet.</li><li>Hoe je de juiste instellingen configureert voor optimaal gebruik.</li><li>Hoe je een klantgesprek analyseert en verbeterpunten benoemt.</li><li>Hoe je een gespreksverslag (notulen) opstelt.</li></ul>"}, {"label": "Klantvraag", "title": "Klantvraag", "html": "\n        <p>Eén student speelt de klant. Gebruik deze klantvraag als begin van het gesprek:</p>\n        <blockquote>Ik wil ook Skype of Teams op mijn tablet kunnen gebruiken. Graag jullie hulp!</blockquote>\n        <p>De servicedeskmedewerker reageert professioneel en vraagt door voordat hij of zij advies geeft.</p>\n    "}, {"label": "Open vragen stellen", "title": "Open vragen stellen", "html": "\n        <p>Stel open vragen om de situatie helder te krijgen. Gebruik deze vragen en voeg waar nodig vervolgvragen toe.</p>\n        <ul class=\"compact-list\"><li>Welke tablet gebruikt u (Android of iPad)?</li><li>Heeft u al een Microsoft-account of Skype-account?</li><li>Wilt u Skype of Teams voor persoonlijk gebruik of voor werk/school?</li><li>Heeft u de app al geprobeerd te downloaden?</li></ul>\n    "}, {"label": "Advies of oplossing", "title": "Advies of oplossing", "html": "\n        <p>Geef pas advies nadat de klantbehoefte duidelijk is. Kies een oplossing die past bij de situatie.</p>\n        <ul class=\"compact-list two-col\"><li>De juiste app downloaden: Voor Skype: Ga naar de Google Play Store (Android) of App Store (iPad) en zoek naar Skype.</li><li>Voor Teams: Zoek in de Google Play Store (Android) of App Store (iPad) naar Microsoft Teams.</li><li>De app installeren en instellen: Download en installeer de app.</li><li>Log in met een bestaand account of maak een nieuw account aan.</li><li>App-machtigingen en instellingen controleren: Zorg ervoor dat de app toegang heeft tot de microfoon en camera.</li><li>Controleer of de internetverbinding werkt (Wi-Fi of mobiel netwerk).</li><li>Testen of de app goed werkt: Voer een testgesprek uit om te controleren of de microfoon en camera goed functioneren.</li></ul>\n        <div class=\"info\"><strong>Tip:</strong> controleer je advies met een betrouwbare bron of met je docent.</div>\n    "}, {"label": "Notulen maken", "title": "Notulen maken", "html": "\n        <p>Een derde student is notulist. Noteer kort en duidelijk:</p>\n        <ul class=\"compact-list\"><li>De gestelde vragen en antwoorden van de klant.</li><li>De uiteindelijke oplossing en het advies.</li><li>Eventuele sterke en verbeterpunten in het gesprek.</li></ul>\n    "}, {"label": "Gesprek evalueren", "title": "Gesprek evalueren", "html": "\n        <p>Bespreek samen het klantgesprek. Gebruik de notulen als bewijs.</p>\n        <ul class=\"compact-list\"><li>Is het probleem goed geanalyseerd?</li><li>Heeft de servicedeskmedewerker duidelijke vragen gesteld?</li><li>Heeft de klant een bruikbaar advies gekregen?</li><li>Wat ging goed (tops) en wat kan beter (tips)?</li></ul>\n        \n    "}, {"label": "Portfolio-bewijs", "title": "Portfolio-bewijs", "html": "<p>Bewaar bewijs waarmee je laat zien wat je hebt gedaan en geleerd.</p><ul class=\"compact-list\"><li>Gespreksnotulen of kort verslag.</li><li>Welke vragen je stelde en welke antwoorden je kreeg.</li><li>Het advies of de oplossing die je gaf.</li><li>Korte reflectie: wat ging goed en wat kan beter?</li></ul>"}]}, {"code": "P2.17", "title": "WhatsApp installeren en gebruiken op een tablet", "steps": [{"label": "Start opdracht", "title": "Start opdracht", "html": "\n    <p><strong>P2.17 · WhatsApp installeren en gebruiken op een tablet</strong></p>\n    <p>In deze opdracht leer je hoe je als servicedeskmedewerker een klant helpt bij het installeren  eenvoudige oplossing): Open een webbrowser op de tablet en ga naar https://web.whatsapp.com.</li><li>Open WhatsApp op de telefoon, ga naar Instellingen &gt; Gekoppelde apparaten en scan de QR-code.</li><li>De tablet is nu verbonden en toont dezelfde chats als op de telefoon.</li><li>WhatsApp-app installeren op een Android-tablet: Download de WhatsApp-app uit de Google Play Store.</li><li>Log in met een bestaand telefoonnummer (let op: dit logt uit op een ander apparaat).</li><li>WhatsApp op een iPad: Download WhatsApp Web of WhatsApp Messenger in de App Store en koppel via de telefoon.</li><li>Let op: WhatsApp kan officieel niet op meerdere apparaten als hoofdaccount worden gebruikt, tenzij gekoppeld via WhatsApp Web.</li></ul>\n        <div class=\"info\"><strong>Tip:</strong> controleer je advies met een betrouwbare bron of met je docent.</div>\n    "}, {"label": "Notulen maken", "title": "Notulen maken", "html": "\n        <p>Een derde student is notulist. Noteer kort en duidelijk:</p>\n        <ul class=\"compact-list\"><li>De gestelde vragen en antwoorden van de klant.</li><li>De uiteindelijke oplossing en het advies.</li><li>Eventuele sterke en verbeterpunten in het gesprek.</li></ul>\n    "}, {"label": "Gesprek evalueren", "title": "Gesprek evalueren", "html": "\n        <p>Bespreek samen het klantgesprek. Gebruik de notulen als bewijs.</p>\n        <ul class=\"compact-list\"><li>Is het probleem goed geanalyseerd?</li><li>Heeft de servicedeskmedewerker duidelijke vragen gesteld?</li><li>Heeft de klant een bruikbaar advies gekregen?</li><li>Wat ging goed (tops) en wat kan beter (tips)?</li></ul>\n        \n    "}, {"label": "Portfolio-bewijs", "title": "Portfolio-bewijs", "html": "<p>Bewaar bewijs waarmee je laat zien wat je hebt gedaan en geleerd.</p><ul class=\"compact-list\"><li>Gespreksnotulen of kort verslag.</li><li>Welke vragen je stelde en welke antwoorden je kreeg.</li><li>Het advies of de oplossing die je gaf.</li><li>Korte reflectie: wat ging goed en wat kan beter?</li></ul>"}]}, {"code": "P2.18", "title": "De juiste tablet kiezen voor muziekpartituren", "steps": [{"label": "Start opdracht", "title": "Start opdracht", "html": "\n    <p><strong>P2.18 · De juiste tablet kiezen voor muziekpartituren</strong></p>\n    <p>In deze opdracht leer je hoe je als servicedeskmedewerker een klant helpt bij het kiezen van een geschikte tablet voor het digitaal lezen van muziekpartituren. Je stelt gerichte vragen om de wensen van de klant te achterhalen, geeft een passend advies en evalueert het gesprek samen met een notulist.</p>\n    <div class=\"note\"><strong>Werkwijze:</strong> werk in rollen, stel open vragen, geef een passend advies en verzamel bewijs voor je portfolio.</div>\n    \n    "}, {"label": "Wat leer je?", "title": "Wat leer je?", "html": "<p>Na deze dagtaak kun je uitleggen en laten zien dat je dit beheerst:</p><ul class=\"compact-list\"><li>Hoe je open vragen stelt om de behoeften van de klant te begrijpen.</li><li>Welke specificaties belangrijk zijn voor een tablet die gebruikt wordt voor muziekpartituren.</li><li>Welke tablets geschikt zijn voor muzikanten en welke apps handig zijn.</li><li>Hoe je een klantgesprek analyseert en verbeterpunten benoemt.</li><li>Hoe je een gespreksverslag (notulen) opstelt.</li></ul>"}, {"label": "Klantvraag", "title": "Klantvraag", "html": "\n        <p>Eén student speelt de klant. Gebruik deze klantvraag als begin van het gesprek:</p>\n        <blockquote>Wat voor tablet moet ik kopen? Ik ben muzikant en wil digitaal mijn muziekpartituren lezen in plaats van op papier.</blockquote>\n        <p>De servicedeskmedewerker reageert professioneel en vraagt door voordat hij of zij advies geeft.</p>\n    "}, {"label": "Open vragen stellen", "title": "Open vragen stellen", "html": "\n        <p>Stel open vragen om de situatie helder te krijgen. Gebruik deze vragen en voeg waar nodig vervolgvragen toe.</p>\n        <ul class=\"compact-list\"><li>Welke formaten muziekpartituren gebruikt u (PDF, apps, andere bestandsformaten)?</li><li>Wilt u alleen partituren lezen, of ook bewerken en aantekeningen maken?</li><li>Heeft u een voorkeur voor een bepaald besturingssysteem (iOS, Android, Windows)?</li><li>Wilt u de tablet met een stylus (digitale pen) gebruiken?</li><li>Heeft u een budget in gedachten?</li></ul>\n    "}, {"label": "Advies of oplossing", "title": "Advies of oplossing", "html": "\n        <p>Geef pas advies nadat de klantbehoefte duidelijk is. Kies een oplossing die past bij de situatie.</p>\n        <ul class=\"compact-list two-col\"><li>Geschikte tablets voor muziekpartituren: Apple iPad Pro (12.9 inch) – Groot scherm, compatibel met Apple Pencil, veel muziekapps beschikbaar (Forscore, Piascore).</li><li>Samsung Galaxy Tab S9+ – Groot scherm, compatibel met S Pen, ondersteuning voor Android-muziekapps.</li><li>Microsoft Surface Pro 9 – Windows-tablet met volledige desktopsoftwareondersteuning.</li><li>Handige apps voor muziekpartituren: Forscore (iOS) – Speciaal voor digitale bladmuziek.</li><li>Piascore (iOS, Android) – Gratis alternatief voor digitale bladmuziek.</li><li>MobileSheets (Android, Windows) – Veelgebruikte app voor bladmuziekbeheer.</li><li>Aanvullende accessoires: Stylus voor aantekeningen in partituren.</li><li>Bluetooth-voetpedaal voor handsfree pagina’s omslaan.</li></ul>\n        <div class=\"info\"><strong>Tip:</strong> controleer je advies met een betrouwbare bron of met je docent.</div>\n    "}, {"label": "Notulen maken", "title": "Notulen maken", "html": "\n        <p>Een derde student is notulist. Noteer kort en duidelijk:</p>\n        <ul class=\"compact-list\"><li>De gestelde vragen en antwoorden van de klant.</li><li>De uiteindelijke oplossing en het advies.</li><li>Eventuele sterke en verbeterpunten in het gesprek.</li></ul>\n    "}, {"label": "Gesprek evalueren", "title": "Gesprek evalueren", "html": "\n        <p>Bespreek samen het klantgesprek. Gebruik de notulen als bewijs.</p>\n        <ul class=\"compact-list\"><li>Is het probleem goed geanalyseerd?</li><li>Heeft de servicedeskmedewerker duidelijke vragen gesteld?</li><li>Heeft de klant een bruikbaar advies gekregen?</li><li>Wat ging goed (tops) en wat kan beter (tips)?</li></ul>\n        \n    "}, {"label": "Portfolio-bewijs", "title": "Portfolio-bewijs", "html": "<p>Bewaar bewijs waarmee je laat zien wat je hebt gedaan en geleerd.</p><ul class=\"compact-list\"><li>Gespreksnotulen of kort verslag.</li><li>Welke vragen je stelde en welke antwoorden je kreeg.</li><li>Het advies of de oplossing die je gaf.</li><li>Korte reflectie: wat ging goed en wat kan beter?</li></ul>"}]}, {"code": "P2.19", "title": "Problemen met een niet-herkende USB-stick oplossen", "steps": [{"label": "Start opdracht", "title": "Start opdracht", "html": "\n    <p><strong>P2.19 · Problemen met een niet-herkende USB-stick oplossen</strong></p>\n    <p>In deze opdracht leer je hoe je als servicedeskmedewerker een klant helpt bij het oplossen van een probleem waarbij een USB-stick niet wordt herkend door de computer. Je stelt gerichte vragen om de oorzaak te achterhalen, geeft een passend advies en evalueert het gesprek samen met een notulist.</p>\n    <div class=\"note\"><strong>Werkwijze:</strong> werk in rollen, stel open vragen, geef een passend advies en verzamel bewijs voor je portfolio.</div>\n    \n    "}, {"label": "Wat leer je?", "title": "Wat leer je?", "html": "<p>Na deze dagtaak kun je uitleggen en laten zien dat je dit beheerst:</p><ul class=\"compact-list\"><li>Hoe je open vragen stelt om het probleem van de klant te begrijpen.</li><li>Hoe je de oorzaak van een niet-herkende USB-stick onderzoekt.</li><li>Welke stappen je kunt nemen om de USB-stick weer werkend te krijgen.</li><li>Hoe je een klantgesprek analyseert en verbeterpunten benoemt.</li><li>Hoe je een gespreksverslag (notulen) opstelt.</li></ul>"}, {"label": "Klantvraag", "title": "Klantvraag", "html": "\n        <p>Eén student speelt de klant. Gebruik deze klantvraag als begin van het gesprek:</p>\n        <blockquote>Mijn USB-stick wordt niet herkend. Kunt u mij helpen?</blockquote>\n        <p>De servicedeskmedewerker reageert professioneel en vraagt door voordat hij of zij advies geeft.</p>\n    "}, {"label": "Open vragen stellen", "title": "Open vragen stellen", "html": "\n        <p>Stel open vragen om de situatie helder te krijgen. Gebruik deze vragen en voeg waar nodig vervolgvragen toe.</p>\n        <ul class=\"compact-list\"><li>Heeft de USB-stick eerder gewerkt op deze of een andere computer?</li><li>Wordt de USB-stick helemaal niet herkend of verschijnt er een foutmelding?</li><li>Heeft u de USB-stick al in een andere USB-poort geprobeerd?</li><li>Zitten er belangrijke bestanden op die u nodig heeft?</li></ul>\n    "}, {"label": "Advies of oplossing", "title": "Advies of oplossing", "html": "\n        <p>Geef pas advies nadat de klantbehoefte duidelijk is. Kies een oplossing die past bij de situatie.</p>\n        <ul class=\"compact-list two-col\"><li>USB-stick testen op een andere computer om te controleren of het probleem aan de stick of de computer ligt.</li><li>Controleren in Schijfbeheer (Windows) of Schijfhulpprogramma (Mac) om te zien of de USB-stick wordt herkend maar geen stationsletter heeft.</li><li>Drivers bijwerken of opnieuw installeren via Apparaatbeheer (Windows).</li><li>Een andere USB-poort proberen of controleren of de USB-poort beschadigd is.</li><li>Een gegevensherstelprogramma gebruiken als de USB-stick defect lijkt maar de gegevens nog terug te halen zijn.</li></ul>\n        <div class=\"info\"><strong>Tip:</strong> controleer je advies met een betrouwbare bron of met je docent.</div>\n    "}, {"label": "Notulen maken", "title": "Notulen maken", "html": "\n        <p>Een derde student is notulist. Noteer kort en duidelijk:</p>\n        <ul class=\"compact-list\"><li>De gestelde vragen en antwoorden van de klant.</li><li>De uiteindelijke oplossing en het advies.</li><li>Eventuele sterke en verbe .</li><li>Hoe je een gespreksverslag (notulen) opstelt.</li></ul>"}, {"label": "Klantvraag", "title": "Klantvraag", "html": "\n        <p>Eén student speelt de klant. Gebruik deze klantvraag als begin van het gesprek:</p>\n        <blockquote>Mijn internetverbinding valt dikwijls weg en ik weet niet waarom. Kunt u mij helpen?</blockquote>\n        <p>De servicedeskmedewerker reageert professioneel en vraagt door voordat hij of zij advies geeft.</p>\n    "}, {"label": "Open vragen stellen", "title": "Open vragen stellen", "html": "\n        <p>Stel open vragen om de situatie helder te krijgen. Gebruik deze vragen en voeg waar nodig vervolgvragen toe.</p>\n        <ul class=\"compact-list\"><li>Gebruikt u een bekabelde of draadloze verbinding?</li><li>Wanneer valt het internet weg (bepaalde tijdstippen of willekeurig)?</li><li>Zijn er meerdere apparaten die problemen hebben met de verbinding?</li><li>Staat de router op een centrale plek en zijn er obstakels die het signaal kunnen blokkeren?</li><li>Heeft u al geprobeerd de router opnieuw op te starten?</li></ul>\n    "}, {"label": "Advies of oplossing", "title": "Advies of oplossing", "html": "\n        <p>Geef pas advies nadat de klantbehoefte duidelijk is. Kies een oplossing die past bij de situatie.</p>\n        <ul class=\"compact-list two-col\"><li>Router opnieuw opstarten en controleren of het probleem aanhoudt.</li><li>Bekabelde verbinding testen om te controleren of het probleem bij de Wi-Fi of de internetprovider ligt.</li><li>Signaalsterkte meten met een app zoals Wi-Fi Analyzer om te zien of er veel storing is.</li><li>De router verplaatsen naar een centrale plek zonder obstakels.</li><li>Firmware van de router bijwerken via de instellingen van de router.</li><li>Contact opnemen met de internetprovider als het probleem blijft aanhouden.</li></ul>\n        <div class=\"info\"><strong>Tip:</strong> controleer je advies met een betrouwbare bron of met je docent.</div>\n    "}, {"label": "Notulen maken", "title opnieuw aansluiten.</li><li>Een gegevensherstelprogramma gebruiken zoals Recuva of EaseUS Data Recovery om verloren bestanden terug te halen.</li><li>Formatteren als laatste optie, als de USB-stick defect is en niet meer toegankelijk, maar dit betekent wel dat de gegevens verloren gaan.</li></ul>\n        <div class=\"info\"><strong>Tip:</strong> controleer je advies met een betrouwbare bron of met je docent.</div>\n    "}, {"label": "Notulen maken", "title": "Notulen maken", "html": "\n        <p>Een derde student is notulist. Noteer kort en duidelijk:</p>\n        <ul class=\"compact-list\"><li>De gestelde vragen en antwoorden van de klant.</li><li>De uiteindelijke oplossing en het advies.</li><li>Eventuele sterke en verbeterpunten in het gesprek.</li></ul>\n    "}, {"label": "Gesprek evalueren", "title": "Gesprek evalueren", "html": "\n        <p>Bespreek samen het klantgesprek. Gebruik de notulen als bewijs.</p>\n        <ul class=\"compact-list\"><li>Is het probleem goed geanalyseerd?</li><li>Heeft de servicedeskmedewerker duidelijke vragen gesteld?</li><li>Heeft de klant een bruikbaar advies gekregen?</li><li>Wat ging goed (tops) en wat kan beter (tips)?</li></ul>\n        \n    "}, {"label": "Portfolio-bewijs", "title": "Portfolio-bewijs", "html": "<p>Bewaar bewijs waarmee je laat zien wat je hebt gedaan en geleerd.</p><ul class=\"compact-list\"><li>Gespreksnotulen of kort verslag.</li><li>Welke vragen je stelde en welke antwoorden je kreeg.</li><li>Het advies of de oplossing die je gaf.</li><li>Korte reflectie: wat ging goed en wat kan beter?</li></ul>"}]}];
let currentTask = 0;
let currentStep = 0;

function renderTaskOptions() {
  const select = document.getElementById('taskSelect');
  select.innerHTML = TASKS.map((task, index) =>
    `<option value="${index}">${task.code} - ${escapeHtml(task.title)}</option>`
  ).join('');
  select.addEventListener('change', function() {
    currentTask = Number(this.value);
    currentStep = 0;
    renderStepMenu();
    renderContent();
  });
}

function renderStepMenu() {
  const menu = document.getElementById('stepMenu');
  const task = TASKS[currentTask];
  menu.innerHTML = task.steps.map((step, index) =>
    `<button class="tab-button ${index === currentStep ? 'active' : ''}" onclick="openStep(${index})">${escapeHtml(step.label)}</button>`
  ).join('');
}

function renderContent() {
  const task = TASKS[currentTask];
  const step = task.steps[currentStep];
  document.getElementById('contentArea').innerHTML = `<h2>${escapeHtml(step.title)}</h2>${step.html}`;
}

function openStep(index) {
  currentStep = index;
  renderStepMenu();
  renderContent();
}

function escapeHtml(value) {
  return String(value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

renderTaskOptions();
renderStepMenu();
renderContent();
</script>
